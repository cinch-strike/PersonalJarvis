name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The unit tests don't open the mic, download Whisper, or call an LLM, so
      # they only need boto3 (botocore) for the aws_sync tests — not the full
      # audio/ML stack. Keeps CI fast and free of system-library dependencies.
      - name: Install test dependencies
        run: python -m pip install --upgrade pip boto3

      - name: Run unit tests
        working-directory: jarvis/phase1
        run: python -m unittest discover -p 'test_*.py' -v
